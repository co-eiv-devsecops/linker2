name: Linker Python CI
 
on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
 
jobs:
  build-and-test:
    name: Build and validate tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Show Python version
        run: python --version
 
      - name: Validate project structure
        run: |
          test -f app.py
          test -f requirements.txt
          test -d tests
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi
 
      - name: Check Python syntax
        run: |
          python -m compileall .
 
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
 
      - name: Start application
        env:
          PORT: 8080
          LINKER_DB: /tmp/linker-ci.db
        run: |
          python app.py > linker.log 2>&1 &
          echo $! > linker.pid
          sleep 3
 
      - name: Validate health endpoint
        run: |
          curl --fail http://127.0.0.1:8080/health
 
      - name: Validate link creation endpoint
        run: |
          response_headers=$(mktemp)
          curl --fail -i -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "url=https://example.com" \
            -o /tmp/linker-response.txt \
            -D "$response_headers"
          grep -i "^Location:" "$response_headers"
 
      - name: Stop application
        if: always()
        run: |
          if [ -f linker.pid ]; then kill $(cat linker.pid) || true; fi
 
      - name: Upload application logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-logs
          path: linker.log
          if-no-files-found: ignore

  publish-image:
    name: Build and publish Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  Build:
    name: Build deployment artifact
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Package application files
        run: |
          mkdir -p artifact
          cp -r app.py config.py database.py link_service.py views.py views requirements.txt artifact/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-app
          path: artifact
          retention-days: 7

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: Build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}

    steps:
      - name: Deploy
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          instance-id: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            sudo mkdir -p /opt/linker-python
            sudo cp -r "$DEPLOY_PATH"/. /opt/linker-python/
            sudo chown -R ubuntu:ubuntu /opt/linker-python

            sudo tee /etc/systemd/system/linker-python.service > /dev/null <<'EOF'
            [Unit]
            Description=Linker Python URL Shortener
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/linker-python
            Environment=PORT=8080
            Environment=LINKER_DB=/opt/linker-python/linker.db
            ExecStart=/usr/bin/python3 /opt/linker-python/app.py
            Restart=always
            RestartSec=5
            KillSignal=SIGINT
            SyslogIdentifier=linker-python

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable linker-python
            sudo systemctl restart linker-python

            sleep 2
            curl --fail http://localhost:8080/health