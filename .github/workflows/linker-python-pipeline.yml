name: Linker Python CI

on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and validate tests
    runs-on: ubuntu-latest

    env:
      HOST: 127.0.0.1
      PORT: 8080
      DB_ENGINE: sqlite
      LINKER_DB: /tmp/linker-ci.db
      DATABASE: /tmp/linker-ci.db
      OTEL_SERVICE_NAME: linker-python-ci
      OTEL_TRACES_ENABLED: "false"
      OTEL_METRICS_ENABLED: "false"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: python --version

      - name: Validate project structure
        run: |
          test -f app.py
          test -f web.py
          test -f config.py
          test -f database.py
          test -f link_service.py
          test -f requirements.txt
          test -d tests
          echo "Project structure is valid."

      - name: Validate healthz route exists
        run: |
          grep -n "healthz" web.py

      - name: Validate no root dynamic short route
        run: |
          if grep -n '@app.get("/<short_id>")' web.py; then
            echo "ERROR: No debe existir @app.get(\"/<short_id>\"). Usar solo /r/<short_id>."
            exit 1
          fi
          echo "Route validation passed."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Start application
        run: |
          python app.py > linker.log 2>&1 &
          echo $! > linker.pid
          sleep 5

      - name: Validate Flask route map in CI
        run: |
          python - <<'PY'
          from web import create_app
          app = create_app(config={"TESTING": True})
          routes = sorted(str(rule) for rule in app.url_map.iter_rules())
          print("\n".join(routes))
          assert "/health" in routes
          assert "/healthz" in routes
          assert "/r/<short_id>" in routes
          assert "/<short_id>" not in routes
          PY

      - name: Validate health endpoint
        run: |
          curl --fail http://127.0.0.1:8080/health

      - name: Validate healthz endpoint
        run: |
          curl --fail http://127.0.0.1:8080/healthz

      - name: Validate link creation endpoint
        run: |
          response_headers=$(mktemp)

          curl --fail -i -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "url=https://example.com" \
            -o /tmp/linker-response.txt \
            -D "$response_headers"

          grep -i "^Location:" "$response_headers"
          grep -i "/r/" "$response_headers"

      - name: Validate reserved healthz is not treated as short URL
        run: |
          curl --fail http://127.0.0.1:8080/healthz

      - name: Stop application
        if: always()
        run: |
          if [ -f linker.pid ]; then kill $(cat linker.pid) || true; fi

      - name: Upload application logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-logs
          path: linker.log
          if-no-files-found: ignore

  publish-image:
    name: Build and publish Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      HOST: 127.0.0.1
      PORT: 8080
      DB_ENGINE: mysql

      MYSQL_HOST: ${{ vars.MYSQL_HOST }}
      MYSQL_PORT: ${{ vars.MYSQL_PORT }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
      MYSQL_USER: ${{ vars.MYSQL_USER }}
      MYSQL_PWD: ${{ secrets.MYSQL_PWD }}

      OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
      OTEL_TRACES_ENABLED: "true"
      OTEL_METRICS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      LAUNCHDARKLY_SDK_KEY: ${{ secrets.LAUNCHDARKLY_SDK_KEY }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  Build:
    name: Build deployment artifact
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Package application files
        run: |
          mkdir -p artifact

          cp app.py artifact/
          cp web.py artifact/
          cp config.py artifact/
          cp database.py artifact/
          cp feature_flags.py artifact/
          cp link_service.py artifact/
          cp linker_app.py artifact/
          cp telemetry.py artifact/
          cp requirements.txt artifact/

          if [ -f views.py ]; then cp views.py artifact/; fi
          if [ -d views ]; then cp -r views artifact/; fi

          # Scripts de instalacion remota y pruebas de integracion:
          # el mismo artefacto se instala igual en el entorno efimero y en blue/green.
          mkdir -p artifact/scripts
          cp scripts/remote_install.sh artifact/scripts/
          cp scripts/integration_tests.sh artifact/scripts/

      - name: Validate packaged artifact
        run: |
          test -f artifact/app.py
          test -f artifact/web.py
          test -f artifact/config.py
          test -f artifact/database.py
          test -f artifact/link_service.py
          test -f artifact/linker_app.py
          test -f artifact/telemetry.py
          test -f artifact/requirements.txt

          # El artefacto debe ser autocontenido: si un modulo local que
          # importa el codigo no viaja en el paquete, fallar aqui y no
          # despues de haber gastado una VM efimera.
          python3 - <<'PY'
          import ast, pathlib, sys

          artifact = pathlib.Path("artifact")
          local = {p.stem for p in pathlib.Path(".").glob("*.py")}
          packaged = {p.stem for p in artifact.glob("*.py")}
          packaged |= {p.name for p in artifact.iterdir() if p.is_dir()}

          missing = set()
          for source in artifact.glob("*.py"):
              for node in ast.walk(ast.parse(source.read_text())):
                  if isinstance(node, ast.Import):
                      names = [alias.name.split(".")[0] for alias in node.names]
                  elif isinstance(node, ast.ImportFrom) and node.level == 0 and node.module:
                      names = [node.module.split(".")[0]]
                  else:
                      continue
                  for name in names:
                      if name in local and name not in packaged:
                          missing.add(f"{source.name} importa '{name}' y no esta en el artefacto")

          if missing:
              print("ERROR: el artefacto no es autocontenido:")
              for item in sorted(missing):
                  print("  -", item)
              sys.exit(1)
          print("Artefacto autocontenido: todos los modulos locales incluidos.")
          PY

          grep -n "healthz" artifact/web.py

          if grep -n '@app.get("/<short_id>")' artifact/web.py; then
            echo "ERROR: El artefacto contiene la ruta problemática /<short_id>"
            exit 1
          fi

          echo "Deployment artifact is valid."

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-app
          path: artifact
          retention-days: 7

  ephemeral-test:
    name: Ephemeral Test Environment
    runs-on: ubuntu-latest
    needs: Build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}
      OCI_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
      OCI_IMAGE_OCID: ${{ vars.OCI_IMAGE_OCID }}
      OCI_AVAILABILITY_DOMAIN: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
      OCI_INSTANCE_SHAPE: ${{ vars.OCI_INSTANCE_SHAPE }}
      OCI_SHAPE_OCPUS: ${{ vars.OCI_SHAPE_OCPUS }}
      OCI_SHAPE_MEMORY_GB: ${{ vars.OCI_SHAPE_MEMORY_GB }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Load infra config (infra/linker.env)
        run: bash scripts/oci/load_infra_env.sh

      - name: Prepare OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'
          silent: 'true'

      - name: Launch ephemeral instance
        id: launch
        env:
          DISPLAY_NAME: linker-ephemeral-${{ github.run_id }}
          FREEFORM_TAGS: '{"linker-role": "ephemeral"}'
        run: bash scripts/oci/launch_instance.sh

      - name: Deploy artifact and run integration tests on ephemeral instance
        uses: ./.github/actions/oci-bastion-deploy
        with:
          instance-id: ${{ steps.launch.outputs.instance_id }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker-ephemeral/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            echo "Configurando entorno efimero autocontenido..."
            # SQLite local y telemetria apagada: las pruebas no deben tocar
            # la base de datos ni las metricas de produccion.
            # (sudo: el artefacto se copia como root a DEPLOY_PATH)
            sudo tee "$DEPLOY_PATH/.env" > /dev/null <<'EOF_ENV'
            HOST=0.0.0.0
            PORT=8080
            DB_ENGINE=sqlite
            LINKER_DB=/opt/linker-python/linker-ephemeral.db
            OTEL_TRACES_ENABLED=false
            OTEL_METRICS_ENABLED=false
            EOF_ENV

            echo "Instalando Linker en el entorno efimero..."
            bash "$DEPLOY_PATH/scripts/remote_install.sh"

            echo "Ejecutando pruebas de integracion y funcionalidad..."
            bash "$DEPLOY_PATH/scripts/integration_tests.sh" http://localhost:8080

      - name: Destroy ephemeral instance
        if: always()
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: bash scripts/oci/terminate_instance.sh


  deploy-blue-green:
    name: Blue/Green Deploy to Prod
    runs-on: ubuntu-latest
    needs: ephemeral-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
    concurrency:
      group: linker-production-deploy
      cancel-in-progress: false

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}
      OCI_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
      OCI_IMAGE_OCID: ${{ vars.OCI_IMAGE_OCID }}
      OCI_AVAILABILITY_DOMAIN: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
      OCI_INSTANCE_SHAPE: ${{ vars.OCI_INSTANCE_SHAPE }}
      OCI_SHAPE_OCPUS: ${{ vars.OCI_SHAPE_OCPUS }}
      OCI_SHAPE_MEMORY_GB: ${{ vars.OCI_SHAPE_MEMORY_GB }}
      # Mecanismo de switchover: Load Balancer (infra/linker.env) o IP flotante
      # (vars.OCI_FLOATING_IP_ADDRESS), ver scripts/oci/switch_traffic.sh
      OCI_FLOATING_IP_ADDRESS: ${{ vars.OCI_FLOATING_IP_ADDRESS }}
      PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Load infra config (infra/linker.env)
        run: bash scripts/oci/load_infra_env.sh

      - name: Prepare OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'
          silent: 'true'

      - name: Find current active environment
        id: active
        run: bash scripts/oci/find_active_instance.sh

      - name: Launch inactive environment (new instance)
        id: launch
        env:
          DISPLAY_NAME: linker-${{ steps.active.outputs.next_color }}-${{ github.run_number }}
          FREEFORM_TAGS: '{"linker-role": "candidate", "linker-color": "${{ steps.active.outputs.next_color }}"}'
        run: |
          echo "Ambiente activo actual: ${{ steps.active.outputs.active_name || 'ninguno' }} (${{ steps.active.outputs.active_color || 'n/a' }})"
          echo "Desplegando nueva version en el ambiente inactivo: ${{ steps.active.outputs.next_color }}"
          bash scripts/oci/launch_instance.sh

      - name: Deploy and QA on inactive environment
        uses: ./.github/actions/oci-bastion-deploy
        with:
          instance-id: ${{ steps.launch.outputs.instance_id }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            echo "Creando archivo .env de produccion..."
            # (sudo: el artefacto se copia como root a DEPLOY_PATH)
            sudo tee "$DEPLOY_PATH/.env" > /dev/null <<'EOF_ENV'
            HOST=0.0.0.0
            PORT=8080
            DB_ENGINE=mysql

            MYSQL_HOST=${{ vars.MYSQL_HOST }}
            MYSQL_PORT=${{ vars.MYSQL_PORT }}
            MYSQL_DATABASE=${{ vars.MYSQL_DATABASE }}
            MYSQL_USER=${{ vars.MYSQL_USER }}
            MYSQL_PWD=${{ secrets.MYSQL_PWD }}

            OTEL_SERVICE_NAME=${{ vars.OTEL_SERVICE_NAME }}
            OTEL_TRACES_ENABLED=true
            OTEL_METRICS_ENABLED=true
            OTEL_EXPORTER_OTLP_ENDPOINT=${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
            OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            LAUNCHDARKLY_SDK_KEY=${{ secrets.LAUNCHDARKLY_SDK_KEY }}
            EOF_ENV

            echo "Instalando Linker en el ambiente inactivo..."
            bash "$DEPLOY_PATH/scripts/remote_install.sh"

            echo "QA: healthchecks y pruebas de funcionalidad en el ambiente inactivo..."
            bash "$DEPLOY_PATH/scripts/integration_tests.sh" http://localhost:8080

      - name: Switchover traffic to new environment
        id: switch
        env:
          TARGET_VNIC_ID: ${{ steps.launch.outputs.vnic_id }}
          TARGET_PRIVATE_IP: ${{ steps.launch.outputs.private_ip }}
        run: bash scripts/oci/switch_traffic.sh

      - name: Validate production after switchover
        id: validate
        run: |
          BASE_URL="${PROD_BASE_URL:-http://2.n-la-c.app}"
          echo "Validando produccion en $BASE_URL despues del switchover..."

          for attempt in $(seq 1 30); do
            if curl --fail --silent --max-time 10 "$BASE_URL/health" > /dev/null; then
              echo "Produccion responde /health (intento $attempt)."
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "ERROR: produccion no respondio /health despues del switchover."
              exit 1
            fi
            sleep 5
          done

          curl --fail --silent "$BASE_URL/healthz" && echo
          bash scripts/integration_tests.sh "$BASE_URL"

      - name: Promote new environment to active
        id: promote
        run: |
          echo "Marcando la nueva instancia como ambiente activo (${{ steps.active.outputs.next_color }})..."
          oci compute instance update \
            --instance-id "${{ steps.launch.outputs.instance_id }}" \
            --freeform-tags '{"linker-role": "active", "linker-color": "${{ steps.active.outputs.next_color }}"}' \
            --force

      - name: Retire previous environment (terminate old VM)
        if: steps.active.outputs.active_id != ''
        env:
          INSTANCE_ID: ${{ steps.active.outputs.active_id }}
        run: |
          echo "Switchover exitoso: retirando la version anterior (${{ steps.active.outputs.active_name }})..."
          bash scripts/oci/terminate_instance.sh

      - name: Rollback on failure (terminate new VM)
        if: failure() && steps.launch.outputs.instance_id != '' && steps.promote.outcome != 'success'
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
          TARGET_VNIC_ID: ${{ steps.active.outputs.active_vnic_id }}
          TARGET_PRIVATE_IP: ${{ steps.active.outputs.active_ip }}
        run: |
          echo "El despliegue fallo: ejecutando rollback."

          if [ "${{ steps.switch.outcome }}" = "success" ] && [ -n "${{ steps.active.outputs.active_vnic_id }}" ]; then
            echo "El trafico ya se habia cambiado: regresandolo al ambiente anterior (${{ steps.active.outputs.active_color }})..."
            bash scripts/oci/switch_traffic.sh
          fi

          echo "Eliminando la VM con la nueva version..."
          bash scripts/oci/terminate_instance.sh

          echo "Rollback completado: produccion sigue en el ambiente anterior."

  grafana-post-deploy:
    name: Grafana Post-Deploy Check
    runs-on: ubuntu-latest
    needs: deploy-blue-green
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      GRAFANA_URL: ${{ vars.GRAFANA_URL }}
      GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Grafana health, dashboards and annotate deployment
        run: bash scripts/grafana_check.sh
