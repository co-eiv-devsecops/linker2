name: Linker Python CI

on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and validate tests
    runs-on: ubuntu-latest

    env:
      HOST: 127.0.0.1
      PORT: 8080
      DB_ENGINE: sqlite
      LINKER_DB: /tmp/linker-ci.db
      DATABASE: /tmp/linker-ci.db
      OTEL_SERVICE_NAME: linker-python-ci
      OTEL_TRACES_ENABLED: "false"
      OTEL_METRICS_ENABLED: "false"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: python --version

      - name: Validate project structure
        run: |
          test -f app.py
          test -f web.py
          test -f config.py
          test -f database.py
          test -f link_service.py
          test -f requirements.txt
          test -d tests
          echo "Project structure is valid."

      - name: Validate healthz route exists
        run: |
          grep -n "healthz" web.py

      - name: Validate no root dynamic short route
        run: |
          if grep -n '@app.get("/<short_id>")' web.py; then
            echo "ERROR: No debe existir @app.get(\"/<short_id>\"). Usar solo /r/<short_id>."
            exit 1
          fi
          echo "Route validation passed."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Start application
        run: |
          python app.py > linker.log 2>&1 &
          echo $! > linker.pid
          sleep 5

      - name: Validate health endpoint
        run: |
          curl --fail http://127.0.0.1:8080/health

      - name: Validate healthz endpoint
        run: |
          curl --fail http://127.0.0.1:8080/healthz

      - name: Validate link creation endpoint
        run: |
          response_headers=$(mktemp)

          curl --fail -i -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "url=https://example.com" \
            -o /tmp/linker-response.txt \
            -D "$response_headers"

          grep -i "^Location:" "$response_headers"
          grep -i "/r/" "$response_headers"

      - name: Validate reserved healthz is not treated as short URL
        run: |
          curl --fail http://127.0.0.1:8080/healthz

      - name: Stop application
        if: always()
        run: |
          if [ -f linker.pid ]; then kill $(cat linker.pid) || true; fi

      - name: Upload application logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-logs
          path: linker.log
          if-no-files-found: ignore

  publish-image:
    name: Build and publish Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      HOST: 127.0.0.1
      PORT: 8080
      DB_ENGINE: mysql

      MYSQL_HOST: ${{ vars.MYSQL_HOST }}
      MYSQL_PORT: ${{ vars.MYSQL_PORT }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
      MYSQL_USER: ${{ vars.MYSQL_USER }}
      MYSQL_PWD: ${{ secrets.MYSQL_PWD }}

      OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
      OTEL_TRACES_ENABLED: "true"
      OTEL_METRICS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      LAUNCHDARKLY_SDK_KEY: ${{ secrets.LAUNCHDARKLY_SDK_KEY }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  Build:
    name: Build deployment artifact
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Package application files
        run: |
          mkdir -p artifact

          cp app.py artifact/
          cp web.py artifact/
          cp config.py artifact/
          cp database.py artifact/
          cp feature_flags.py artifact/
          cp link_service.py artifact/
          cp requirements.txt artifact/

          if [ -f views.py ]; then cp views.py artifact/; fi
          if [ -d views ]; then cp -r views artifact/; fi

      - name: Validate packaged artifact
        run: |
          test -f artifact/app.py
          test -f artifact/web.py
          test -f artifact/config.py
          test -f artifact/database.py
          test -f artifact/link_service.py
          test -f artifact/requirements.txt

          grep -n "healthz" artifact/web.py

          if grep -n '@app.get("/<short_id>")' artifact/web.py; then
            echo "ERROR: El artefacto contiene la ruta problemática /<short_id>"
            exit 1
          fi

          echo "Deployment artifact is valid."

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-app
          path: artifact
          retention-days: 7

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: Build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}

      HOST: 0.0.0.0
      PORT: 8080
      DB_ENGINE: mysql

      MYSQL_HOST: ${{ vars.MYSQL_HOST }}
      MYSQL_PORT: ${{ vars.MYSQL_PORT }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
      MYSQL_USER: ${{ vars.MYSQL_USER }}
      MYSQL_PWD: ${{ secrets.MYSQL_PWD }}

      OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
      OTEL_TRACES_ENABLED: "true"
      OTEL_METRICS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      LAUNCHDARKLY_SDK_KEY: ${{ secrets.LAUNCHDARKLY_SDK_KEY }}

    steps:
      - name: Deploy
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          instance-id: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            sudo mkdir -p /opt/linker-python
            sudo rm -rf /opt/linker-python/*
            sudo cp -r "$DEPLOY_PATH"/. /opt/linker-python/
            sudo chown -R ubuntu:ubuntu /opt/linker-python

            echo "Validando archivo web.py desplegado..."
            test -f /opt/linker-python/web.py
            grep -n "healthz" /opt/linker-python/web.py

            if grep -n '@app.get("/<short_id>")' /opt/linker-python/web.py; then
              echo "ERROR: La versión desplegada contiene @app.get(\"/<short_id>\")"
              exit 1
            fi

            sudo tee /opt/linker-python/.env > /dev/null <<EOF
            HOST=${HOST}
            PORT=${PORT}
            DB_ENGINE=${DB_ENGINE}

            MYSQL_HOST=${MYSQL_HOST}
            MYSQL_PORT=${MYSQL_PORT}
            MYSQL_DATABASE=${MYSQL_DATABASE}
            MYSQL_USER=${MYSQL_USER}
            MYSQL_PWD=${MYSQL_PWD}

            OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
            OTEL_TRACES_ENABLED=${OTEL_TRACES_ENABLED}
            OTEL_METRICS_ENABLED=${OTEL_METRICS_ENABLED}
            OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
            OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
            LAUNCHDARKLY_SDK_KEY=${LAUNCHDARKLY_SDK_KEY}
            EOF

            sudo chown ubuntu:ubuntu /opt/linker-python/.env
            sudo chmod 600 /opt/linker-python/.env

            cd /opt/linker-python

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt

            sudo tee /etc/systemd/system/linker-python.service > /dev/null <<'EOF'
            [Unit]
            Description=Linker Python URL Shortener
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/linker-python
            EnvironmentFile=/opt/linker-python/.env
            ExecStart=/opt/linker-python/.venv/bin/python /opt/linker-python/app.py
            Restart=always
            RestartSec=5
            KillSignal=SIGINT
            SyslogIdentifier=linker-python

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable linker-python
            sudo systemctl restart linker-python

            sleep 5

            echo "Validando /health..."
            curl --fail http://localhost:8080/health

            echo "Validando /healthz..."
            curl --fail http://localhost:8080/healthz

            echo "Validando que /healthz no sea tratado como short URL..."
            curl -i http://localhost:8080/healthz

            echo "Despliegue finalizado correctamente."
