name: Linker Python CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate-build-package:
    name: Validate, test and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: python --version

      - name: Validate project structure
        run: |
          test -f app.py
          test -d linker
          test -d tests
          test -f linker/config.py
          test -f linker/contracts.py
          test -f linker/services.py
          test -f linker/database.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check Python syntax
        run: python -m compileall app.py linker tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build executable pyz
        run: |
          mkdir -p dist/package
          python -m zipapp . \
            --main "linker.__main__:run" \
            --python "/usr/bin/env python3" \
            --output dist/package/linker.pyz

      - name: Create runtime package
        run: |
          cp README.md DOCUMENTO.md dist/package/ 2>/dev/null || true
          cat > dist/package/run.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          export LINKER_HOST="${LINKER_HOST:-0.0.0.0}"
          export LINKER_PORT="${LINKER_PORT:-8080}"
          export LINKER_DB="${LINKER_DB:-linker.db}"
          python3 linker.pyz
          EOF
          chmod +x dist/package/run.sh
          cat > dist/package/.env.example <<'EOF'
          LINKER_HOST=0.0.0.0
          LINKER_PORT=8080
          LINKER_DB=linker.db
          LINKER_PUBLIC_BASE_URL=https://X.n-la-c.app
          LINKER_ID_LENGTH=6
          EOF
          cd dist/package
          zip -qr ../linker-python.zip .

      - name: Start packaged application
        env:
          LINKER_HOST: 127.0.0.1
          LINKER_PORT: 8080
          LINKER_DB: /tmp/linker-ci.db
          LINKER_PUBLIC_BASE_URL: http://127.0.0.1:8080
        run: |
          cd dist/package
          python3 linker.pyz > ../../linker.log 2>&1 &
          echo $! > ../../linker.pid
          sleep 3

      - name: Validate health endpoint
        run: curl --fail http://127.0.0.1:8080/health

      - name: Validate link creation endpoint
        run: |
          response_headers=$(mktemp)
          curl --fail -i -X POST http://127.0.0.1:8080/api/links \
            -H "Content-Type: application/json" \
            --data '{"url":"https://example.com"}' \
            -o /tmp/linker-response.json \
            -D "$response_headers"
          grep -i "^Location:" "$response_headers"

      - name: Stop application
        if: always()
        run: |
          if [ -f linker.pid ]; then kill $(cat linker.pid) || true; fi

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-python-runtime
          path: dist/linker-python.zip

      - name: Upload application logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-logs
          path: linker.log
          if-no-files-found: ignore
