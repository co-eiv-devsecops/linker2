<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linker Python</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f3f6fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #64748b;
            --error: #b91c1c;
            --success: #166534;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, .18), transparent 30%),
                linear-gradient(135deg, #f8fafc, var(--bg));
            color: var(--text);
            padding: 24px;
        }

        main {
            width: min(760px, 100%);
            background: var(--card);
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
        }

        .badge {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1e40af;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(32px, 6vw, 56px);
            line-height: 1;
        }

        p {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.5;
        }

        form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
        }

        button {
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover { background: var(--primary-dark); }

        #result {
            margin-top: 24px;
            padding: 18px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            display: none;
        }

        #result strong {
            display: block;
            margin-bottom: 8px;
        }

        #short-link {
            color: var(--primary);
            font-weight: 700;
            word-break: break-all;
        }

        .error { color: var(--error); }
        .success { color: var(--success); }

        footer {
            margin-top: 28px;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 620px) {
            main { padding: 26px; }
            form { grid-template-columns: 1fr; }
            button { padding: 16px; }
        }
    </style>
</head>
<body>
    <main>
        <span class="badge">Cloud - Python - SQLite</span>
        <h1>Linker Python</h1>
        <p>
            Servicio simple para acortar URL. Escribe una direccion completa,
            genera un enlace corto y compartelo.
        </p>

        <form id="form">
            <input id="url" name="url" type="url" placeholder="https://ejemplo.com/recurso" required autofocus />
            <button id="button" type="submit">Acortar</button>
        </form>

        <section id="result">
            <strong id="message"></strong>
            <a id="short-link" href="#" target="_blank" rel="noopener"></a>
        </section>

        <footer>
            Aplicacion basada en el ejercicio Linker.
        </footer>
    </main>

    <script>
        const form = document.getElementById('form');
        const urlInput = document.getElementById('url');
        const result = document.getElementById('result');
        const message = document.getElementById('message');
        const shortLink = document.getElementById('short-link');
        const button = document.getElementById('button');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            result.style.display = 'none';
            message.className = '';
            shortLink.textContent = '';
            shortLink.href = '#';
            button.disabled = true;
            button.textContent = 'Creando...';

            const data = new URLSearchParams();
            data.append('url', urlInput.value);

            try {
                const response = await fetch('/link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                    },
                    body: data
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || 'No fue posible crear el enlace.');
                }

                const location = response.headers.get('Location');
                message.textContent = 'Enlace creado correctamente:';
                message.className = 'success';
                shortLink.textContent = location;
                shortLink.href = location;
                result.style.display = 'block';
                form.reset();
                urlInput.focus();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'error';
                result.style.display = 'block';
            } finally {
                button.disabled = false;
                button.textContent = 'Acortar';
            }
        });
    </script>
</body>
</html>
